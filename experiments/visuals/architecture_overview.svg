<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 520" style="background:#0f172a; font-family: -apple-system, 'Segoe UI', 'Inter', sans-serif;">
  <defs>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e11d48"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#059669"/>
    </marker>
    <marker id="arrow-gray" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
    <filter id="glow-red">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-green">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="bg-left" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="bg-right" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1100" height="520" fill="#0f172a"/>
  <rect x="20" y="20" width="525" height="480" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <rect x="555" y="20" width="525" height="480" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>

  <!-- Titles -->
  <text x="282" y="58" text-anchor="middle" font-size="16" font-weight="bold" fill="#f1f5f9">❌ Before: Channel Fracture</text>
  <text x="817" y="58" text-anchor="middle" font-size="16" font-weight="bold" fill="#f1f5f9">✅ After: CADVP + ADE 三级门禁</text>

  <!-- ============ LEFT SIDE: CHANNEL FRACTURE ============ -->

  <!-- Scheduler Agent -->
  <rect x="60" y="100" width="180" height="60" rx="8" fill="#082f49" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="150" y="125" text-anchor="middle" font-size="12" font-weight="bold" fill="#22d3ee">Scheduler Agent</text>
  <text x="150" y="145" text-anchor="middle" font-size="9" fill="#94a3b8">"写入 task_context"</text>

  <!-- Arrow: Scheduler → Memory Guard -->
  <line x1="240" y1="130" x2="330" y2="130" stroke="#e11d48" stroke-width="2" marker-end="url(#arrow-red)" stroke-dasharray="6,3"/>

  <!-- Memory Guard (blocked) -->
  <rect x="340" y="90" width="180" height="80" rx="8" fill="#441015" stroke="#e11d48" stroke-width="2"/>
  <text x="430" y="118" text-anchor="middle" font-size="11" font-weight="bold" fill="#fb7185">🛡️ Memory Guard</text>
  <text x="430" y="138" text-anchor="middle" font-size="10" fill="#f87171" font-weight="bold">skip_memory = True</text>
  <text x="430" y="157" text-anchor="middle" font-size="9" fill="#f87171">✖ BLOCKED</text>

  <!-- Big X -->
  <text x="430" y="120" text-anchor="middle" font-size="40" fill="#e11d48" opacity="0.15" filter="url(#glow-red)">✖</text>

  <!-- Arrow: blocked → target never receives -->
  <line x1="520" y1="130" x2="580" y2="130" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow-gray)" opacity="0.4"/>

  <!-- Target Agent (empty) -->
  <rect x="790" y="100" width="180" height="60" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <text x="880" y="125" text-anchor="middle" font-size="11" font-weight="bold" fill="#475569">Target Agent</text>
  <text x="880" y="145" text-anchor="middle" font-size="9" fill="#334155">内存: {} (空)</text>

  <!-- Consequence box -->
  <rect x="60" y="210" width="460" height="70" rx="8" fill="#441015" stroke="#e11d48" stroke-width="1" opacity="0.7"/>
  <text x="290" y="238" text-anchor="middle" font-size="12" font-weight="bold" fill="#fb7185">⚠️ 后果：Channel Fracture</text>
  <text x="290" y="258" text-anchor="middle" font-size="10" fill="#f87171">数据被静默丢弃，无日志、无异常、无回滚</text>

  <!-- "Data Lost" tombstone -->
  <rect x="60" y="310" width="460" height="50" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="290" y="335" text-anchor="middle" font-size="14" font-weight="bold" fill="#e11d48">💀 数据丢失 ｜ 无通知 ｜ 系统降级</text>

  <!-- ============ RIGHT SIDE: CADVP REPAIR ============ -->

  <!-- Scheduler Agent -->
  <rect x="590" y="100" width="180" height="60" rx="8" fill="#082f49" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="680" y="125" text-anchor="middle" font-size="12" font-weight="bold" fill="#22d3ee">Scheduler Agent</text>
  <text x="680" y="145" text-anchor="middle" font-size="9" fill="#94a3b8">"写入 repaired_context"</text>

  <!-- Arrow 1 → Memory Guard blocked -->
  <line x1="770" y1="115" x2="850" y2="115" stroke="#e11d48" stroke-width="1.5" marker-end="url(#arrow-red)" stroke-dasharray="4,3"/>

  <!-- Memory Guard still blocks -->
  <rect x="860" y="85" width="160" height="60" rx="8" fill="#441015" stroke="#e11d48" stroke-width="1.5"/>
  <text x="940" y="108" text-anchor="middle" font-size="9" font-weight="bold" fill="#fb7185">🛡️ Memory Guard</text>
  <text x="940" y="125" text-anchor="middle" font-size="9" fill="#f87171">skip=True → ✖</text>

  <!-- → CC-0 Detect -->
  <line x1="770" y1="145" x2="820" y2="200" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arrow-gray)"/>
  <text x="772" y="172" font-size="9" fill="#fbbf24">检测</text>

  <!-- CC-0 Verifier -->
  <rect x="600" y="200" width="170" height="55" rx="8" fill="#422006" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="685" y="225" text-anchor="middle" font-size="10" font-weight="bold" fill="#fbbf24">🔍 CC-0 验证器</text>
  <text x="685" y="243" text-anchor="middle" font-size="9" fill="#fcd34d">FRACTURE DETECTED</text>

  <!-- → Register Channel -->
  <line x1="770" y1="227" x2="830" y2="227" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arrow-gray)"/>

  <!-- CADVP Repair Controller -->
  <rect x="840" y="200" width="160" height="55" rx="8" fill="#064e3b" stroke="#34d399" stroke-width="1.5"/>
  <text x="920" y="225" text-anchor="middle" font-size="10" font-weight="bold" fill="#34d399">🔧 动态通道注册</text>
  <text x="920" y="243" text-anchor="middle" font-size="9" fill="#6ee7b7">channel_id = cadvp_*</text>

  <!-- Repair arrow back to Memory Guard -->
  <line x1="920" y1="255" x2="940" y2="145" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="938" y="208" font-size="9" fill="#34d399">授权</text>

  <!-- Now retry succeeds -->
  <line x1="1020" y1="115" x2="1060" y2="115" stroke="#34d399" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- Target Agent (restored) -->
  <rect x="1070" y="85" width="180" height="60" rx="8" fill="#064e3b" stroke="#34d399" stroke-width="1.5"/>
  <text x="1160" y="110" text-anchor="middle" font-size="11" font-weight="bold" fill="#34d399">Target Agent</text>
  <text x="1160" y="130" text-anchor="middle" font-size="9" fill="#6ee7b7">内存: repaired_context ✅</text>

  <!-- Three-Gate System below -->
  <rect x="590" y="290" width="460" height="70" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="820" y="315" text-anchor="middle" font-size="12" font-weight="bold" fill="#22d3ee">ADE 三级门禁验证</text>

  <!-- L1 -->
  <rect x="605" y="330" width="130" height="40" rx="6" fill="#064e3b" stroke="#34d399" stroke-width="1"/>
  <text x="670" y="348" text-anchor="middle" font-size="9" font-weight="bold" fill="#34d399">🟢 L1 自验</text>
  <text x="670" y="362" text-anchor="middle" font-size="8" fill="#6ee7b7">存在/完整/一致</text>

  <line x1="735" y1="350" x2="755" y2="350" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow-gray)"/>

  <!-- L2 -->
  <rect x="765" y="330" width="130" height="40" rx="6" fill="#3730a3" stroke="#a78bfa" stroke-width="1"/>
  <text x="830" y="348" text-anchor="middle" font-size="9" font-weight="bold" fill="#a78bfa">🔵 L2 证据</text>
  <text x="830" y="362" text-anchor="middle" font-size="8" fill="#c4b5fd">哈希+日志追溯</text>

  <line x1="895" y1="350" x2="915" y2="350" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow-gray)"/>

  <!-- L3 -->
  <rect x="925" y="330" width="110" height="40" rx="6" fill="#4c1d95" stroke="#a78bfa" stroke-width="1"/>
  <text x="980" y="348" text-anchor="middle" font-size="9" font-weight="bold" fill="#a78bfa">🟣 L3 复核</text>
  <text x="980" y="362" text-anchor="middle" font-size="8" fill="#c4b5fd">独立验证1.0</text>

  <!-- Success Result -->
  <rect x="590" y="395" width="460" height="50" rx="6" fill="#064e3b" stroke="#34d399" stroke-width="1.5"/>
  <text x="820" y="418" text-anchor="middle" font-size="13" font-weight="bold" fill="#34d399">✅ 三级门禁全过 → 交付确认</text>
  <text x="820" y="435" text-anchor="middle" font-size="9" fill="#6ee7b7">质量评分 1.0 ｜ 数据完整性验证 ｜ 哈希一致性检查</text>

  <!-- Bottom annotation -->
  <text x="550" y="500" text-anchor="middle" font-size="9" fill="#475569">Channel Fracture · arXiv:2606.04896 · Dexing Liu</text>
</svg>
