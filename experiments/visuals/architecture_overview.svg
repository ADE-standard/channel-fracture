<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" style="background:#FAFAFA;">
  <defs>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#DC2626"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16A34A"/>
    </marker>
    <marker id="arrow-gray" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9CA3AF"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#D97706"/>
    </marker>
  </defs>

  <!-- Panels -->
  <rect x="20" y="20" width="575" height="520" rx="8" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1.5"/>
  <rect x="605" y="20" width="575" height="520" rx="8" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1.5"/>

  <!-- Panel Titles -->
  <rect x="20" y="20" width="575" height="36" rx="8" fill="#FEF2F2" stroke="#FECACA" stroke-width="1"/>
  <text x="307" y="44" text-anchor="middle" font-family="DejaVu Sans" font-size="13" font-weight="bold" fill="#DC2626">Before: Channel Fracture (Silent Failure)</text>

  <rect x="605" y="20" width="575" height="36" rx="8" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1"/>
  <text x="892" y="44" text-anchor="middle" font-family="DejaVu Sans" font-size="13" font-weight="bold" fill="#16A34A">After: CADVP v1.1 + Three-Gate System</text>

  <!-- ============ LEFT: BEFORE ============ -->

  <!-- Scheduler Agent -->
  <rect x="50" y="100" width="200" height="50" rx="6" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="150" y="120" text-anchor="middle" font-family="DejaVu Sans" font-size="11" font-weight="bold" fill="#1D4ED8">Scheduler Agent</text>
  <text x="150" y="137" text-anchor="middle" font-family="DejaVu Sans" font-size="9" fill="#6B7280">writes to target memory</text>

  <!-- Arrow to Memory Guard -->
  <line x1="250" y1="125" x2="340" y2="125" stroke="#DC2626" stroke-width="2" marker-end="url(#arrow-red)" stroke-dasharray="5,3"/>

  <!-- Memory Guard Block -->
  <rect x="350" y="85" width="200" height="80" rx="6" fill="#FEF2F2" stroke="#DC2626" stroke-width="2"/>
  <text x="450" y="110" text-anchor="middle" font-family="DejaVu Sans" font-size="11" font-weight="bold" fill="#DC2626">Memory Guard</text>
  <text x="450" y="128" text-anchor="middle" font-family="DejaVu Sans" font-size="10" fill="#EF4444">skip_memory=True</text>
  <text x="450" y="148" text-anchor="middle" font-family="DejaVu Sans" font-size="10" font-weight="bold" fill="#DC2626">[WRITE BLOCKED]</text>

  <!-- Blocked arrow -->
  <line x1="550" y1="125" x2="610" y2="125" stroke="#D1D5DB" stroke-width="1.5" marker-end="url(#arrow-gray)" stroke-dasharray="4,3"/>

  <!-- Target Agent (empty) -->
  <rect x="620" y="100" width="200" height="50" rx="6" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="720" y="120" text-anchor="middle" font-family="DejaVu Sans" font-size="11" font-weight="bold" fill="#9CA3AF">Target Agent</text>
  <text x="720" y="137" text-anchor="middle" font-family="DejaVu Sans" font-size="9" fill="#D1D5DB">memory: {} (empty)</text>

  <!-- Consequences -->
  <rect x="50" y="200" width="510" height="55" rx="6" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="1"/>
  <text x="305" y="222" text-anchor="middle" font-family="DejaVu Sans" font-size="11" font-weight="bold" fill="#DC2626">Silent Failure Chain</text>
  <text x="305" y="240" text-anchor="middle" font-family="DejaVu Sans" font-size="10" fill="#EF4444">No exception raised | No error log | No rollback mechanism triggered</text>

  <!-- Failure tombstone -->
  <rect x="50" y="280" width="510" height="45" rx="6" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1"/>
  <text x="80" y="308" font-family="DejaVu Sans" font-size="20" fill="#DC2626" font-weight="bold">X</text>
  <text x="110" y="308" font-family="DejaVu Sans" font-size="11" fill="#475569">Data silently discarded</text>
  <text x="80" y="318" font-family="DejaVu Sans" font-size="20" fill="#DC2626" font-weight="bold">X</text>
  <text x="110" y="318" font-family="DejaVu Sans" font-size="11" fill="#475569">Sender-side verification passes (false positive)</text>

  <!-- Writer vs Reader -->
  <rect x="50" y="360" width="240" height="55" rx="6" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1"/>
  <text x="170" y="380" text-anchor="middle" font-family="DejaVu Sans" font-size="10" font-weight="bold" fill="#16A34A">Writer's View (Channel A/B)</text>
  <text x="170" y="398" text-anchor="middle" font-family="DejaVu Sans" font-size="9" fill="#6B7280">Direct DB write succeeds</text>

  <line x1="290" y1="387" x2="330" y2="387" stroke="#9CA3AF" stroke-width="1.5"/>

  <rect x="340" y="360" width="220" height="55" rx="6" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="1"/>
  <text x="450" y="380" text-anchor="middle" font-family="DejaVu Sans" font-size="10" font-weight="bold" fill="#DC2626">Reader's View (Channel C)</text>
  <text x="450" y="398" text-anchor="middle" font-family="DejaVu Sans" font-size="9" fill="#EF4444">Both tools absent at cron context</text>

  <!-- Footer -->
  <text x="50" y="490" font-family="DejaVu Sans" font-size="9" fill="#9CA3AF">Three channels tested: A (Direct SQLite) OK | B (Self-write) OK | C (Cron-delegated) FAIL</text>

  <!-- ============ RIGHT: AFTER ============ -->

  <!-- Scheduler Agent -->
  <rect x="640" y="90" width="180" height="50" rx="6" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="730" y="110" text-anchor="middle" font-family="DejaVu Sans" font-size="11" font-weight="bold" fill="#1D4ED8">Scheduler Agent</text>
  <text x="730" y="127" text-anchor="middle" font-family="DejaVu Sans" font-size="9" fill="#6B7280">writes to target memory</text>

  <!-- Arrow to Memory Guard -->
  <line x1="820" y1="115" x2="900" y2="115" stroke="#DC2626" stroke-width="1.5" marker-end="url(#arrow-red)" stroke-dasharray="4,3"/>

  <!-- Memory Guard -->
  <rect x="910" y="85" width="180" height="60" rx="6" fill="#FEF2F2" stroke="#DC2626" stroke-width="1.5"/>
  <text x="1000" y="107" text-anchor="middle" font-family="DejaVu Sans" font-size="10" font-weight="bold" fill="#DC2626">Memory Guard</text>
  <text x="1000" y="125" text-anchor="middle" font-family="DejaVu Sans" font-size="9" fill="#EF4444">skip_memory=True</text>

  <!-- Detection arrow: Memory Guard to CC-0 -->
  <line x1="900" y1="135" x2="860" y2="190" stroke="#D97706" stroke-width="1.5" marker-end="url(#arrow-amber)"/>
  <text x="878" y="168" font-family="DejaVu Sans" font-size="8" fill="#D97706">detect</text>

  <!-- CC-0 Verifier -->
  <rect x="660" y="195" width="230" height="55" rx="6" fill="#FFFBEB" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="775" y="217" text-anchor="middle" font-family="DejaVu Sans" font-size="10" font-weight="bold" fill="#D97706">CC-0 Channel Verification</text>
  <text x="775" y="237" text-anchor="middle" font-family="DejaVu Sans" font-size="9" fill="#B45309">Channel C: FRACTURE DETECTED (VETO)</text>

  <!-- Fallback arrow -->
  <line x1="890" y1="222" x2="940" y2="222" stroke="#D97706" stroke-width="1.5" marker-end="url(#arrow-amber)"/>

  <!-- Failsafe Channel -->
  <rect x="950" y="195" width="190" height="55" rx="6" fill="#F0FDF4" stroke="#16A34A" stroke-width="1.5"/>
  <text x="1045" y="217" text-anchor="middle" font-family="DejaVu Sans" font-size="10" font-weight="bold" fill="#16A34A">Failsafe Channel</text>
  <text x="1045" y="237" text-anchor="middle" font-family="DejaVu Sans" font-size="9" fill="#22C55E">retry with DB bypass</text>

  <!-- Recovery arrow back up -->
  <line x1="1045" y1="250" x2="1045" y2="145" stroke="#16A34A" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="1055" y="205" font-family="DejaVu Sans" font-size="8" fill="#16A34A">recover</text>

  <!-- Retry arrow success -->
  <line x1="1090" y1="115" x2="1140" y2="115" stroke="#16A34A" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- Target Agent (restored) -->
  <rect x="1150" y="85" width="180" height="60" rx="6" fill="#F0FDF4" stroke="#16A34A" stroke-width="1.5"/>
  <text x="1240" y="108" text-anchor="middle" font-family="DejaVu Sans" font-size="11" font-weight="bold" fill="#16A34A">Target Agent</text>
  <text x="1240" y="128" text-anchor="middle" font-family="DejaVu Sans" font-size="9" fill="#22C55E">memory: data written OK</text>

  <!-- Three-Gate System -->
  <rect x="640" y="290" width="510" height="52" rx="6" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1"/>
  <text x="895" y="312" text-anchor="middle" font-family="DejaVu Sans" font-size="11" font-weight="bold" fill="#2563EB">ADE Three-Gate Quality System</text>
  <text x="895" y="328" text-anchor="middle" font-family="DejaVu Sans" font-size="9" fill="#6B7280">L1 Self-Verification  |  L2 Evidence Verification  |  L3 Cross-Review</text>

  <!-- Gates boxes -->
  <rect x="660" y="355" width="140" height="38" rx="4" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1"/>
  <text x="730" y="375" text-anchor="middle" font-family="DejaVu Sans" font-size="9" font-weight="bold" fill="#16A34A">L1 Self-Verify</text>
  <text x="730" y="387" text-anchor="middle" font-family="DejaVu Sans" font-size="8" fill="#6B7280">output exists + correct</text>

  <line x1="800" y1="374" x2="825" y2="374" stroke="#9CA3AF" stroke-width="1"/>

  <rect x="835" y="355" width="140" height="38" rx="4" fill="#F5F3FF" stroke="#C4B5FD" stroke-width="1"/>
  <text x="905" y="375" text-anchor="middle" font-family="DejaVu Sans" font-size="9" font-weight="bold" fill="#7C3AED">L2 Evidence</text>
  <text x="905" y="387" text-anchor="middle" font-family="DejaVu Sans" font-size="8" fill="#6B7280">hash + log trail</text>

  <line x1="975" y1="374" x2="1000" y2="374" stroke="#9CA3AF" stroke-width="1"/>

  <rect x="1010" y="355" width="120" height="38" rx="4" fill="#F5F3FF" stroke="#C4B5FD" stroke-width="1"/>
  <text x="1070" y="375" text-anchor="middle" font-family="DejaVu Sans" font-size="9" font-weight="bold" fill="#7C3AED">L3 Cross-Review</text>
  <text x="1070" y="387" text-anchor="middle" font-family="DejaVu Sans" font-size="8" fill="#6B7280">independent check</text>

  <!-- Final result -->
  <rect x="640" y="420" width="510" height="52" rx="6" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1.5"/>
  <text x="895" y="442" text-anchor="middle" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#16A34A">All Gates Passed - Delivery Confirmed</text>
  <text x="895" y="458" text-anchor="middle" font-family="DejaVu Sans" font-size="9" fill="#6B7280">Quality score: 1.0 | Data integrity verified | Hash consistency confirmed</text>

  <!-- Footer -->
  <text x="640" y="495" font-family="DejaVu Sans" font-size="9" fill="#9CA3AF">CADVP CC-0 detects fracture at channel level | Three-Gate system verifies delivery at quality level</text>
</svg>
